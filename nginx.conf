server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Permite que Angular funcione como SPA
    # Si el usuario entra a /catalog, /favorites o /product/1,
    # Nginx devuelve index.html para que Angular maneje la ruta.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Comunicación con el contenedor de la API
    # Todas las peticiones que empiecen por /api/
    # serán enviadas al servicio "api" en el puerto 3000.
    location /api/ {
        proxy_pass http://api:3000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}